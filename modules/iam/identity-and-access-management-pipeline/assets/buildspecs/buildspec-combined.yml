version: 0.2

phases:
  pre_build:
    commands:
      - |
        set -e
        DEFAULT_PATH=$(pwd)
        export TF_LOG=INFO

      - |
        echo "Terraform installation..."
        cd /tmp
        curl -q -o terraform_${TERRAFORM_VERSION}_linux_arm64.zip https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_arm64.zip
        unzip -q -o terraform_${TERRAFORM_VERSION}_linux_arm64.zip
        mv terraform /usr/bin
        terraform -no-color --version
        cd $DEFAULT_PATH

      - |
        echo "Rendering providers.jinja -> providers.tf..."
        sed -e "s|{{ region }}|${TF_BACKEND_REGION}|g" \
            -e "s|{{ bucket }}|${TF_BACKEND_BUCKET}|g" \
            -e "/{{ ddb_table }}/d" \
            providers.jinja > providers.tf
        echo "Generated providers.tf:"
        cat providers.tf

      - |
        echo "Terraform init..."
        terraform init
        terraform fmt
        terraform validate
  build:
    commands:
      - |
        echo "Terraform plan..."
        terraform plan -out output.tfplan

      - |
        echo "Terraform apply..."
        if [ $GIT_BRANCH == $BRANCH_NAME ]; then
            terraform apply -parallelism=20 "output.tfplan"
        fi
